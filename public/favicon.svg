<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E7D32" />
      <stop offset="100%" stop-color="#1B5E20" />
    </linearGradient>
    <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4CAF50" />
      <stop offset="100%" stop-color="#2E7D32" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1B5E20" flood-opacity="0.4" />
    </filter>
  </defs>
  
  <!-- Outer Rounded Square background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Subtle speed lines / badge accents -->
  <path d="M 60 180 L 160 180 M 40 256 L 140 256 M 80 332 L 180 332" stroke="#4CAF50" stroke-width="14" stroke-linecap="round" opacity="0.4" />

  <!-- Outer Wheel Ring -->
  <circle cx="280" cy="256" r="140" fill="none" stroke="#FFFFFF" stroke-width="28" filter="url(#glow)" />
  
  <!-- Tire Tread Accents -->
  <circle cx="280" cy="256" r="165" fill="none" stroke="#4CAF50" stroke-width="10" stroke-dasharray="20 18" opacity="0.9" />

  <!-- Inner Wheel Circle -->
  <circle cx="280" cy="256" r="110" fill="url(#wheelGrad)" stroke="#FFFFFF" stroke-width="8" />

  <!-- "1" Number in center of wheel -->
  <text x="280" y="305" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="140" fill="#FFFFFF" text-anchor="middle">1</text>
  
  <!-- Speed swoop underline -->
  <path d="M 160 380 Q 280 430 430 380" fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" />
  <path d="M 190 405 Q 280 445 400 405" fill="none" stroke="#4CAF50" stroke-width="12" stroke-linecap="round" />
</svg>
